name: CD - Deploy to EC2

on:
  workflow_run:
    workflows: ["CI - Run Tests"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --build-arg APP_ENV=prod -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          docker build --build-arg APP_ENV=prod \
            -f bot/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:bot-$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:bot-$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:bot-$IMAGE_TAG \
            $ECR_REGISTRY/$ECR_REPOSITORY:bot-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:bot-latest

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Log in to ECR from EC2
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Pull latest images
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:bot-latest

            # Create shared network if it doesn't exist
            docker network create expense-network || true

            # Stop and remove old containers
            docker stop expense-tracker || true
            docker rm expense-tracker || true
            docker stop expense-bot || true
            docker rm expense-bot || true

            # Run app container
            docker run -d \
              --name expense-tracker \
              --restart unless-stopped \
              --network expense-network \
              -p 8000:8000 \
              -e APP_ENV=prod \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e BEDROCK_MODEL_ID=${{ secrets.BEDROCK_MODEL_ID }} \
              -e MODEL_TEMPERATURE=${{ secrets.MODEL_TEMPERATURE }} \
              -e CONFIDENCE_THRESHOLD=${{ secrets.CONFIDENCE_THRESHOLD }} \
              -e LOG_LEVEL=${{ secrets.LOG_LEVEL }} \
              -e S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }} \
              ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

            # Run bot container
            docker run -d \
              --name expense-bot \
              --restart unless-stopped \
              --network expense-network \
              -p 8001:8001 \
              -e APP_ENV=prod \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e BOT_TOKEN=${{ secrets.BOT_TOKEN }} \
              -e WEBHOOK_URL=${{ secrets.WEBHOOK_URL }} \
              -e API_BASE_URL=http://expense-tracker:8000 \
              -v /etc/nginx/ssl/bot.crt:/etc/nginx/ssl/bot.crt:ro \
              ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:bot-latest
            
            # Clean up old images to prevent disk space issues
            docker image prune -af