services:
  app:
    build: .
    container_name: expense_tracker
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app/db:/app/app/db

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: expense_bot
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - /etc/nginx/ssl/bot.crt:/etc/nginx/ssl/bot.crt:ro
    depends_on:
      - app